name: CI - Build and Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        run: |
          docker build -t chandu9000/ci-cd-backend ./backend
          docker push chandu9000/ci-cd-backend:latest

      - name: Build and Push Frontend
        run: |
          docker build -t chandu9000/ci-cd-frontend ./frontend
          docker push chandu9000/ci-cd-frontend:latest
